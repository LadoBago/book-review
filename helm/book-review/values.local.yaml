api:
  replicaCount: 1
  image:
    repository: book-review-api
    tag: local
    pullPolicy: Never
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    ASPNETCORE_ENVIRONMENT: Development
    Keycloak__Audience: book-review-api

web:
  replicaCount: 1
  image:
    repository: book-review-web
    tag: local
    pullPolicy: Never
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  env:
    NEXTAUTH_URL: http://localhost:30000
    KEYCLOAK_CLIENT_ID: book-review-web

ingress:
  enabled: false

secrets:
  dbConnectionString: "Host=host.docker.internal;Port=5432;Database=book_review;Username=bookreview;Password=bookreview_secret"
  azureStorageConnectionString: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://host.docker.internal:10000/devstoreaccount1"
  keycloakAuthority: "http://host.docker.internal:8080/realms/book-review"
  nextauthSecret: "dev-secret-change-in-production"
  keycloakIssuer: "http://host.docker.internal:8080/realms/book-review"

configMap:
  otelEndpoint: ""
  otelServiceName: book-review-api
