apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.configMap.otelEndpoint | quote }}
  OTEL_SERVICE_NAME: {{ .Values.configMap.otelServiceName | quote }}
