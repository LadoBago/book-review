apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: {{ .Values.secrets.dbConnectionString | quote }}
  AzureStorage__ConnectionString: {{ .Values.secrets.azureStorageConnectionString | quote }}
  Keycloak__Authority: {{ .Values.secrets.keycloakAuthority | quote }}
  Keycloak__ExternalAuthority: {{ .Values.secrets.keycloakExternalAuthority | default .Values.secrets.keycloakAuthority | quote }}
  Keycloak__RequireHttpsMetadata: {{ if hasKey .Values.secrets "keycloakRequireHttpsMetadata" }}{{ .Values.secrets.keycloakRequireHttpsMetadata | quote }}{{ else }}"true"{{ end }}
  NEXTAUTH_SECRET: {{ .Values.secrets.nextauthSecret | quote }}
  AUTH_SECRET: {{ .Values.secrets.nextauthSecret | quote }}
  KEYCLOAK_ISSUER: {{ .Values.secrets.keycloakIssuer | quote }}
