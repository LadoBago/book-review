name: CD - Deploy to AKS

on:
  push:
    branches:
      - main

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
  AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}
  HELM_RELEASE_NAME: book-review

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push API image
        run: |
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/book-review-api:${{ steps.meta.outputs.version }} \
            -f src/backend/src/BookReview.Presentation/Dockerfile \
            src/backend
          docker push ${{ env.ACR_LOGIN_SERVER }}/book-review-api:${{ steps.meta.outputs.version }}

      - name: Build and push Web image
        run: |
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/book-review-web:${{ steps.meta.outputs.version }} \
            -f src/frontend/Dockerfile \
            src/frontend
          docker push ${{ env.ACR_LOGIN_SERVER }}/book-review-web:${{ steps.meta.outputs.version }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ./helm/book-review \
            -n book-review --create-namespace \
            -f helm/book-review/values.prod.yaml \
            --set api.image.repository=${{ env.ACR_LOGIN_SERVER }}/book-review-api \
            --set api.image.tag=${{ needs.build-and-push.outputs.image-tag }} \
            --set web.image.repository=${{ env.ACR_LOGIN_SERVER }}/book-review-web \
            --set web.image.tag=${{ needs.build-and-push.outputs.image-tag }} \
            --set secrets.dbConnectionString="${{ secrets.DB_CONNECTION_STRING }}" \
            --set secrets.azureStorageConnectionString="${{ secrets.AZURE_STORAGE_CONNECTION }}" \
            --set secrets.keycloakAuthority="${{ secrets.KEYCLOAK_AUTHORITY }}" \
            --set secrets.keycloakExternalAuthority="${{ secrets.KEYCLOAK_EXTERNAL_AUTHORITY }}" \
            --set-string secrets.keycloakRequireHttpsMetadata="true" \
            --set secrets.keycloakIssuer="${{ secrets.KEYCLOAK_ISSUER }}" \
            --set secrets.nextauthSecret="${{ secrets.NEXTAUTH_SECRET }}" \
            --wait --timeout 5m
